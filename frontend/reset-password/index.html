<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Font Awesome for eye icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Admin</title>
      <link rel="icon" type="image/svg+xml" href="/Asset/favicon.svg" />
  <link rel="stylesheet" href="/admin/css/admin.min.css" />
</head>
<body>
  <div class="login-container" style="max-width:400px;margin:5em auto;background:#fff;padding:2em 2em 1.5em 2em;border-radius:12px;box-shadow:0 4px 24px rgba(30,40,90,0.1);display:flex;flex-direction:column;gap:1.5em;">
    <h2 style="text-align:center;margin-bottom:1em;color:#2e3657;">Reset Password</h2>
    <form id="reset-password-form" style="display:flex;flex-direction:column;gap:1em;margin-bottom:1.5em;background:#fff;padding:1.2em 1em;border-radius:8px;box-shadow:0 1px 4px rgba(30,40,90,.04);">
      <label for="password" style="margin-bottom:0.5em;font-weight:500;color:#222;">New Password:</label>
      <div style="position:relative;width:100%;">
        <input type="password" id="password" name="password" required placeholder="New password" style="width:100%;box-sizing:border-box;padding-right:38px;" />
        <span id="togglePassword" aria-label="Show/Hide Password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;outline:none;cursor:pointer;font-size:1.3em;color:#888;padding:0;display:flex;align-items:center;justify-content:center;height:100%;">
          <i class="fa fa-eye" id="togglePasswordIcon"></i>
        </span>
      </div>
      <label for="confirm-password" style="margin-bottom:0.5em;font-weight:500;color:#222;">Confirm New Password:</label>
      <div style="position:relative;width:100%;margin-top:1em;">
        <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm new password" style="width:100%;box-sizing:border-box;padding-right:38px;" />
        <span id="toggleConfirmPassword" aria-label="Show/Hide Password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;outline:none;cursor:pointer;font-size:1.3em;color:#888;padding:0;display:flex;align-items:center;justify-content:center;height:100%;">
          <i class="fa fa-eye" id="toggleConfirmPasswordIcon"></i>
        </span>
      </div>
      <button type="submit" id="reset-btn" style="padding:0.7em 1.5em;background:linear-gradient(90deg,#2e3657 60%,#4e5ba6 100%);color:#fff;border:none;border-radius:6px;font-size:1em;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(30,40,90,0.06);transition:background 0.2s,box-shadow 0.2s;">Reset Password</button>
      <div id="reset-message" style="margin-top:0.5em;text-align:center;font-size:1em;"></div>
    </form>
    <div style="margin-top:1.2em;text-align:center;">
      <a href="/admin/login/index.html" style="color:#0ea5e9;text-decoration:underline;font-weight:500;">Back to Login</a>
    </div>
  </div>
  <script>
    // Password toggle logic
    document.addEventListener('DOMContentLoaded', function() {
      const pwdInput = document.getElementById('password');
      const toggle = document.getElementById('togglePassword');
      const toggleIcon = document.getElementById('togglePasswordIcon');
      if (toggle && pwdInput && toggleIcon) {
        toggle.addEventListener('click', function(e) {
          e.preventDefault();
          const type = pwdInput.type === 'password' ? 'text' : 'password';
          pwdInput.type = type;
          toggleIcon.className = type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
        });
        toggle.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle.click();
          }
        });
      }
      const cpwdInput = document.getElementById('confirm-password');
      const ctoggle = document.getElementById('toggleConfirmPassword');
      const ctoggleIcon = document.getElementById('toggleConfirmPasswordIcon');
      if (ctoggle && cpwdInput && ctoggleIcon) {
        ctoggle.addEventListener('click', function(e) {
          e.preventDefault();
          const type = cpwdInput.type === 'password' ? 'text' : 'password';
          cpwdInput.type = type;
          ctoggleIcon.className = type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
        });
        ctoggle.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            ctoggle.click();
          }
        });
      }
    });
    // Reset password form logic (example, update endpoint and payload as needed)
    document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('reset-btn');
      const messageDiv = document.getElementById('reset-message');
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Resetting...';
      messageDiv.textContent = '';
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      if (password !== confirmPassword) {
        messageDiv.style.color = '#e53e3e';
        messageDiv.textContent = 'Passwords do not match.';
        btn.disabled = false;
        btn.textContent = originalText;
        return;
      }
      // You need to get the token from the URL or other source
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      if (!token) {
        messageDiv.style.color = '#e53e3e';
        messageDiv.textContent = 'Invalid or missing token.';
        btn.disabled = false;
        btn.textContent = originalText;
        return;
      }
      try {
        const res = await fetch('https://alexokoriengobe.onrender.com/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: password })
        });
        if (res.ok) {
          messageDiv.style.color = '#17843b';
          messageDiv.textContent = 'Password reset successful! You can now log in.';
        } else {
          const data = await res.json();
          messageDiv.style.color = '#e53e3e';
          messageDiv.textContent = data.message || 'Password reset failed.';
        }
      } catch (err) {
        messageDiv.style.color = '#e53e3e';
        messageDiv.textContent = 'Network error. Please try again.';
      }
      btn.disabled = false;
      btn.textContent = originalText;
    });
  </script>
</body>
</html>
