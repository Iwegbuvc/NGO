<!-- Edit Project Modal -->
<!-- Delete Confirmation Modal -->
<div id="deleteProjectModal" class="modal" style="display: none">
  <div class="modal-content" style="max-width: 340px">
    <span class="close-modal" id="closeDeleteModal">&times;</span>
    <h3>Delete Project</h3>
    <p>Are you sure you want to delete this project?</p>
    <div
      style="
        display: flex;
        gap: 1em;
        justify-content: center;
        margin-top: 1.5em;
      "
    >
      <button id="cancelDeleteBtn" style="background: #888">Cancel</button>
      <button id="confirmDeleteBtn" style="background: #e53e3e">Delete</button>
    </div>
  </div>
</div>
<div id="editProjectModal" class="modal" style="display: none">
  <div class="modal-content">
    <span class="close-modal" id="closeEditModal">&times;</span>
    <h3>Edit Project</h3>
    <form id="edit-project-form">
      <input
        type="text"
        name="editLocation"
        id="editLocation"
        placeholder="Location"
        required
      />
      <textarea
        name="editDescription"
        id="editDescription"
        placeholder="Description"
        required
      ></textarea>
      <textarea
        name="editText"
        id="editText"
        placeholder="Title/Text"
        required
      ></textarea>
      <button type="submit">Save Changes</button>
    </form>
  </div>
</div>
