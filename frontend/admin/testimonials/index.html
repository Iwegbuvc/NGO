    <span class="close-modal" id="closeDeleteTestiModal">&times;</span>

    <p>Are you sure you want to delete this testimonial?</p>
    <div
      style="
        display: flex;
        gap: 1em;
        justify-content: center;
        margin-top: 1.5em;
      "
    >
      <button id="cancelDeleteTestiBtn" style="background: #888">Cancel</button>
      <button id="confirmDeleteTestiBtn" style="background: #e53e3e">
        Delete
      </button>
    </div>
  </div>
</div>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Hamburger menu toggle
        const hamburger = document.getElementById("adminHamburgerBtn");
        const mobileNav = document.getElementById("adminMobileNav");
        const navOverlay = document.getElementById("adminNavOverlay");
        const closeBtn = document.getElementById("closeAdminNavBtn");
        function openMobileNav() {
          mobileNav.classList.add("active");
          navOverlay.classList.add("active");
        }
        function closeMobileNav() {
          mobileNav.classList.remove("active");
          navOverlay.classList.remove("active");
        }
        hamburger.addEventListener("click", openMobileNav);
        closeBtn.addEventListener("click", closeMobileNav);
        navOverlay.addEventListener("click", closeMobileNav);
        // Responsive nav: hide desktop links on small screens
        function handleResize() {
          const navLinks = document.querySelector(".nav-header ul");
          if (window.innerWidth <= 900) {
            if (navLinks) navLinks.style.display = "none";
            hamburger.style.display = "inline-flex";
          } else {
            if (navLinks) navLinks.style.display = "flex";
            hamburger.style.display = "none";
            closeMobileNav();
          }
        }
        window.addEventListener("resize", handleResize);
        handleResize();
      });
    </script>
