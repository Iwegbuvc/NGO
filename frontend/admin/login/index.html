<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Okorie Foundation</title>
    <link rel="icon" type="image/svg+xml" href="../../Asset/favicon.svg" />
    <link rel="stylesheet" href="../css/admin.min.css" />
    <!-- Font Awesome for eye icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .login-container {
        max-width: 400px;
        margin: 5em auto;
        background: #fff;
        padding: 2em 2em 1.5em 2em;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(30, 40, 90, 0.1);
        display: flex;
        flex-direction: column;
        gap: 1.5em;
      }

      .login-container h2 {
        text-align: center;
        margin-bottom: 1em;
        color: #2e3657;
      }
      .login-container input {
        padding: 0.7em 1em;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 1em;
        background: #f7f8fa;
        transition: border 0.2s;
      }
      .login-container button {
        padding: 0.7em 1.5em;
        background: linear-gradient(90deg, #2e3657 60%, #4e5ba6 100%);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1em;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(30, 40, 90, 0.06);
        transition:
          background 0.2s,
          box-shadow 0.2s;
      }
      .login-container button:hover {
        background: linear-gradient(90deg, #4e5ba6 60%, #2e3657 100%);
      }
      .login-error {
        color: #e53e3e;
        text-align: center;
        font-size: 1em;
      }
    </style>
  </head>
  <body>
    <!-- <script src="../js/auth-check.min.js"></script> -->
    <!-- Removed duplicate auth-check.min.js script -->
    <div class="login-container">
      <h2>Admin Login</h2>
      <form id="login-form">
        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          style="width: 100%; box-sizing: border-box"
        />
        <div style="position: relative">
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Password"
            required
            style="width: 100%; box-sizing: border-box"
          />
          <span
            class="toggle-password"
            style="
              position: absolute;
              right: 12px;
              top: 50%;
              transform: translateY(-50%);
              cursor: pointer;
              color: #888;
            "
          >
            <i class="fa fa-eye" id="togglePassword"></i>
          </span>
        </div>
        <button type="submit" id="login-btn">Login</button>
        <div
          id="login-message"
          style="margin-top: 0.5em; text-align: center; font-size: 1em"
        ></div>
        <div style="margin-top: 1.2em; text-align: center">
          <span>Don't have an account?</span>
          <a
            href="../register/"
            style="
              color: #0ea5e9;
              text-decoration: underline;
              font-weight: 500;
              margin-left: 4px;
            "
            >Register as Admin</a
          >
        </div>
        <div style="margin-top: 0.7em; text-align: center">
          <a
            href="../forgot-password/"
            style="color: #e53e3e; text-decoration: underline; font-weight: 500"
            >Forgot Password?</a
          >
        </div>
      </form>
      <div id="login-error" class="login-error"></div>
    </div>
    <!-- <script src="../js/login.min.js"></script> -->
    <script src="../js/toast.js"></script>
    <script>
      // Password show/hide toggle
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener("click", function () {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);
          this.classList.toggle("fa-eye-slash");
        });
      }

      // Login form submit handler
      document.addEventListener("DOMContentLoaded", function () {
        const loginForm = document.getElementById("login-form");
        if (loginForm) {
          loginForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            const btn = document.getElementById("login-btn");
            const messageDiv = document.getElementById("login-message");
            btn.disabled = true;
            const originalText = btn.textContent;
            btn.textContent = "Logging in...";
            messageDiv.textContent = "";
            const email = this.email.value.trim();
            const password = this.password.value;
            try {
              const res = await fetch(
                "https://alexokoriengobe.onrender.com/api/auth/login",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ email, password }),
                },
              );
              if (res.ok) {
                const data = await res.json();
                console.log("Login response:", data); // Debug: show response data
                if (data.token) {
                  localStorage.setItem("token", data.token);
                }
                messageDiv.style.color = "#17843b";
                messageDiv.textContent = "Login successful!";
                setTimeout(function () {
                  window.location.href = "../dashboard/";
                }, 800);
              } else {
                const data = await res.json();
                messageDiv.style.color = "#e53e3e";
                messageDiv.textContent = data.message || "Login failed.";
              }
            } catch (err) {
              messageDiv.style.color = "#e53e3e";
              messageDiv.textContent = "Network error. Please try again.";
            }
            btn.disabled = false;
            btn.textContent = originalText;
          });
        }
      });
    </script>
  </body>
</html>
