<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Admin</title>
    <link rel="icon" type="image/svg+xml" href="/Asset/favicon.svg" />
    <link rel="stylesheet" href="css/admin.min.css" />
  </head>
  <body>
    <div class="login-container" style="max-width:400px;margin:5em auto;background:#fff;padding:2em 2em 1.5em 2em;border-radius:12px;box-shadow:0 4px 24px rgba(30,40,90,0.1);display:flex;flex-direction:column;gap:1.5em;">
      <h2 style="text-align:center;margin-bottom:1em;color:#2e3657;">Forgot Password</h2>
      <form id="forgot-password-form" style="display:flex;flex-direction:column;gap:1em;margin-bottom:1.5em;background:#fff;padding:1.2em 1em;border-radius:8px;box-shadow:0 1px 4px rgba(30,40,90,.04);">
        <label for="email" style="margin-bottom:0.5em;font-weight:500;color:#222;">Enter your admin email address:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="Email address"
          style="padding:0.7em 1em;border:1px solid #d1d5db;border-radius:6px;font-size:1em;background:#f7f8fa;transition:border 0.2s;"
        />
        <button type="submit" id="forgot-btn" style="padding:0.7em 1.5em;background:linear-gradient(90deg,#2e3657 60%,#4e5ba6 100%);color:#fff;border:none;border-radius:6px;font-size:1em;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(30,40,90,0.06);transition:background 0.2s,box-shadow 0.2s;">Send Reset Link</button>
        <div id="forgot-message" style="margin-top:0.5em;text-align:center;font-size:1em;"></div>
      </form>
      <div id="forgot-message" style="margin-top:0.5em;text-align:center;font-size:1em;"></div>
      <div style="margin-top:1.2em;text-align:center;">
        <a href="login.html" style="color:#0ea5e9;text-decoration:underline;font-weight:500;">Back to Login</a>
      </div>
    </div>
    <script>
      document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const messageDiv = document.getElementById('forgot-message');
        messageDiv.textContent = '';
        try {
          const res = await fetch('https://alexokoriengobe.onrender.com/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          if (res.ok) {
            messageDiv.style.color = '#17843b';
            messageDiv.textContent = 'Reset link sent! Please check your email.';
            setTimeout(function() {
              window.location.href = 'reset-password.html';
            }, 1200);
          } else {
            const data = await res.json();
            messageDiv.style.color = '#e53e3e';
            messageDiv.textContent = data.message || 'Failed to send reset link.';
          }
        } catch (err) {
          messageDiv.style.color = '#e53e3e';
          messageDiv.textContent = 'Network error. Please try again.';
        }
      });
    </script>
  </body>
</html>
    <script>
      document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('forgot-btn');
        const messageDiv = document.getElementById('forgot-message');
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = 'Sending...';
        messageDiv.textContent = '';
        const email = document.getElementById('email').value.trim();
        try {
          const res = await fetch('https://alexokoriengobe.onrender.com/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          if (res.ok) {
            messageDiv.style.color = '#17843b';
            messageDiv.textContent = 'Reset link sent! Please check your email.';
          } else {
            const data = await res.json();
            messageDiv.style.color = '#e53e3e';
            messageDiv.textContent = data.message || 'Failed to send reset link.';
          }
        } catch (err) {
          messageDiv.style.color = '#e53e3e';
          messageDiv.textContent = 'Network error. Please try again.';
        }
        btn.disabled = false;
        btn.textContent = originalText;
      });
    </script>
